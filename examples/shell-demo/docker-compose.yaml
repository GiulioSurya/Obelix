services:
  bash-server:
    build:
      context: ../..
      dockerfile: examples/shell-demo/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./policy.yaml:/app/policy.yaml:ro
      - ${HOME}/.config/openshell/gateways/openshell/mtls:/app/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENSHELL_GATEWAY=host.docker.internal:8080
      - OPENSHELL_TLS_CERT_DIR=/app/certs
    env_file:
      - .env
